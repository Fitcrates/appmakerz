<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 120" fill="none">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g id="circuit-main" stroke="#57F2E3" stroke-width="2" fill="none" filter="url(#neon-glow)">
    <path id="main-path-1" d="M0,60 L400,60 L420,40 L600,40 L630,70 L900,70 L940,30 L1100,30 L1130,60 L1600,60" />
  </g>

  <g id="circuit-branches" stroke="#57F2E3" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Branch 1 -->
    <path d="M410,50 L430,70 L500,70 L520,90" />
    <path d="M480,70 L490,60 L540,60" />
    <!-- Branch 2 -->
    <path d="M615,55 L645,85 L720,85 L740,105" />
    <path d="M850,70 L870,90 L950,90 L970,110" />
    <!-- Branch 3 -->
    <path d="M920,50 L950,80 L1020,80" />
    <path d="M1060,30 L1080,10 L1150,10 L1170,30" />
    <!-- Branch 4 -->
    <path d="M1115,45 L1135,25 L1200,25" />
    <path d="M1250,60 L1280,30 L1350,30 L1370,50" />
    <path d="M1400,60 L1420,80 L1480,80 L1500,100" />
  </g>

  <g id="circuit-nodes" fill="#57F2E3" filter="url(#neon-glow)">
    <!-- Main nodes -->
    <circle cx="400" cy="60" r="4" />
    <circle cx="420" cy="40" r="4" />
    <circle cx="600" cy="40" r="4" />
    <circle cx="630" cy="70" r="5" />
    <circle cx="900" cy="70" r="4" />
    <circle cx="940" cy="30" r="5" />
    <circle cx="1100" cy="30" r="4" />
    <circle cx="1130" cy="60" r="4" />

    <!-- Branch nodes -->
    <circle cx="520" cy="90" r="3" />
    <circle cx="540" cy="60" r="3" />
    <circle cx="740" cy="105" r="3" />
    <circle cx="970" cy="110" r="3" />
    <circle cx="1020" cy="80" r="3" />
    <circle cx="1170" cy="30" r="3" />
    <circle cx="1200" cy="25" r="3" />
    <circle cx="1370" cy="50" r="3" />
    <circle cx="1500" cy="100" r="3" />
  </g>
</svg>
