[build]
  command = "npm run build:next"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "https://appcrates.netlify.app/*"
  to = "https://appcrates.pl/:splat"
  status = 301
  force = true

# Netlify's edge cache is per-PoP by default, so the first visitor at each
# location misses and wakes the Next.js server function. Measured on the live
# site: 4.21 s TTFB cold vs 0.17 s warm — ~3.3 s of that is the cold function,
# not DNS or TLS. `durable` promotes the rendered HTML into a shared global
# cache, so a cold PoP is served from the cache instead of the function.
#
# Deliberately scoped to page routes: /api/* must never be cached by the CDN,
# and /_next/static + /media are plain static assets that never touch a
# function anyway. s-maxage matches `export const revalidate = 3600`.
[[headers]]
  for = "/"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, durable, s-maxage=3600, stale-while-revalidate=604800"

[[headers]]
  for = "/pl/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, durable, s-maxage=3600, stale-while-revalidate=604800"

[[headers]]
  for = "/en/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, durable, s-maxage=3600, stale-while-revalidate=604800"

# The server function still runs in us-east-1 (~120 ms RTT from Poland) on every
# cache miss and revalidation. Moving it to Frankfurt requires a Pro plan or
# above; uncommenting this on a lower plan fails the build.
# [functions]
#   region = "eu-central-1"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Keep the custom AI edge function on Netlify while the site itself runs on Next.js.
[[edge_functions]]
  path = "/api/ai-generate"
  function = "ai-generate"

[[plugins]]
  package = "@netlify/plugin-nextjs"
