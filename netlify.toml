[build]
  command = "npm run build:next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "https://appcrates.netlify.app/*"
  to = "https://appcrates.pl/:splat"
  status = 301
  force = true

# Keep the custom AI edge function on Netlify while the site itself runs on Next.js.
[[edge_functions]]
  path = "/api/ai-generate"
  function = "ai-generate"
