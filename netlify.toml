[build]
  command = "tsc && vite build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Bot prerendering
[[edge_functions]]
  path = "/"
  function = "social-crawler"

[[edge_functions]]
  path = "/blog"
  function = "social-crawler"

[[edge_functions]]
  path = "/faq"
  function = "social-crawler"

[[edge_functions]]
  path = "/privacy-policy"
  function = "social-crawler"

[[edge_functions]]
  path = "/unsubscribe"
  function = "social-crawler"

[[edge_functions]]
  path = "/blog/*"
  function = "social-crawler"

[[edge_functions]]
  path = "/project/*"
  function = "social-crawler"

# AI generation edge function (50s timeout vs 10s for regular functions)
[[edge_functions]]
  path = "/api/ai-generate"
  function = "ai-generate"
